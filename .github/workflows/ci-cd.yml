name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-ci:
    name: Backend CI (Spring Boot)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Test Backend
        run: |
          cd backend
          mvn clean test

  frontend-ci:
    name: Frontend CI (Next.js)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd frontend
          npm install

      - name: Build Frontend
        run: |
          cd frontend
          npm run build
        env:
          NEXT_PUBLIC_API_URL: https://amrutha-chicken-backend.onrender.com
          NEXT_PUBLIC_SITE_URL: https://amruthachicken.com

  docker-validation:
    name: Docker Image Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Validate Backend Docker Image Build
        run: |
          docker build -t amrutha-backend:test ./backend

      - name: Validate Frontend Docker Image Build
        run: |
          docker build -t amrutha-frontend:test --build-arg NEXT_PUBLIC_API_URL=https://amrutha-chicken-backend.onrender.com --build-arg NEXT_PUBLIC_SITE_URL=https://amruthachicken.com ./frontend

  deploy:
    name: Deploy to Render
    needs: [backend-ci, frontend-ci, docker-validation]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Backend Deployment
        run: |
          curl -f -X POST "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}"

      - name: Trigger Frontend Deployment
        run: |
          curl -f -X POST "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}"
